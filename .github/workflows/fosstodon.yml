name: Fosstodon

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5

      - name: Send latest post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          pip install feedparser requests

          python << 'EOF'
          import feedparser
          import requests
          import os

          feed = feedparser.parse("https://fosstodon.org/@ratatui_rs.rss")
          entry = feed.entries[0]

          title = entry.get("title", "New Fosstodon post")
          link = entry.get("link", "https://fosstodon.org/@ratatui_rs")

          requests.post(
              os.environ["WEBHOOK_URL"],
              json={
                  "content": (
                      f"🐀🤖 **New squeak from @ratatui_rs**\n\n"
                      f"{title}\n"
                      f"{link}"
                  )
              },
          ).raise_for_status()
          EOF
